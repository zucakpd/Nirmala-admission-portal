{% extends "base.html" %}
{% block title %}Add Student - Nirmala Admission Portal{% endblock %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="row mb-4">
        <div class="col">
            <h2><i class="bi bi-person-plus"></i> Add New Student</h2>
            <p class="text-muted">Register a new student application</p>
        </div>
    </div>
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Student Application Form</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_student') }}">
                <!-- Personal Information -->
                <h5 class="mb-3"><i class="bi bi-person-vcard"></i> Personal Information</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="col-md-6">
                     <label for="application_id" class="form-label">Application Number <span class="text-danger">*</span></label>
                     <input type="text" class="form-control" id="application_id" name="application_id" 
                        placeholder="" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="col-md-4">
                        <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10}" required>
                    </div>
                    <div class="col-md-4">
                        <label for="dob" class="form-label">DOB <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="dob" name="dob" required>
                    </div>
                    <div class="col-md-4">
                        <label for="gender" class="form-label">Gender <span class="text-danger">*</span></label>
                        <select class="form-select" id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Female">Female</option>
                            
                        </select>
                    </div>
                </div>
                <!-- Academic Information -->
                <h5 class="mb-3"><i class="bi bi-mortarboard"></i> Academic Information</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="twelfth_marks" class="form-label">Overall Percentage(12th) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" min="0" max="100" class="form-control" id="twelfth_marks" name="twelfth_marks" required>
                    </div>
                    <div class="col-md-12">
                        <label for="course" class="form-label">Courses<span class="text-danger">*</span></label>
                        <select class="form-select" id="course" name="course" required onchange="updateSubjectFields()">
                                    <option value="Select course">Select Course</option>
                                    <option value="B.Sc Mathematics">B.Sc Mathematics</option>
                                    <option value="B.Sc Chemistry">B.Sc Chemistry</option>
                                    <option value="B.Sc Botany">B.Sc Botany</option>
                                    <option value="B.Sc Zoology">B.Sc Zoology</option>
                                    <option value="B.Sc Physics">B.Sc Physics</option>
                                    <option value="B.Sc Geography">B.Sc Geography</option>
                                    <option value="B.A History">B.A History</option>
                                    <option value="B.A Economics">B.A Economics</option>
                                    <option value="B.Com">B.Com </option>
                        </select>
                    </div>
                </div>
                <!-- Cutoff Subject Marks -->
                <div id="subject-marks-section" style="display:none;">
                    <div class="card border-warning mb-4">
                        <div class="card-header bg-warning text-dark">
                            <h5 class="mb-0"><i class="bi bi-calculator"></i> 12th Subject Marks <small class="fw-normal"></small></h5>
                        </div>
                        <div class="card-body">
                            <div id="cutoff-formula-info" class="alert alert-info mb-3" style="display:none;"></div>
                            <div class="row g-3" id="subject-fields-container">
                <!-- Dynamically populated -->
                        </div>
                        </div>
                    </div>
                </div>
               <!-- Religion Information -->
               <h5 class="mb-3"><i class="bi bi-people"></i> Category Information</h5>
               <div class="row g-3 mb-4">
               <!-- Religion -->
               <div class="col-md-4">
               <label for="religion" class="form-label">Religion <span class="text-danger">*</span></label>
               <select class="form-select" id="religion" name="religion" required onchange="toggleRC()">
            <option value="">Select Religion</option>
            <option value="Hindu">Hindu</option>
            <option value="Muslim">Muslim</option>
            <option value="Christian">Christian</option>
            <option value="Sikh">Sikh</option>
            <option value="Jain">Jain</option>
            <option value="Buddhist">Buddhist</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <!-- RC Option -->
<div class="col-md-4" id="rc" style="display:none;">
    <label class="form-label">RC(Roman Catholic)</label>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rc" id="rcYes" value="Yes">
        <label class="form-check-label" for="rcYes">
            Yes
        </label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="rc" id="rcNo" value="No">
        <label class="form-check-label" for="rcNo">
            No
        </label>
    </div>
</div><script>
function toggleRC() {
    var religion = document.getElementById("religion").value;
    var rc = document.getElementById("rc");

    if (religion === "Christian") {
        rc.style.display = "block";
    } else {
        rc.style.display = "none";
    }
}
</script>
    <!-- Community -->
    <div class="col-md-4">
        <label for="community" class="form-label">Community <span class="text-danger">*</span></label>
        <select class="form-select" id="community" name="community" required>
            <option value="">Select Community</option>
            <option value="BC">BC (Backward Class)</option>
            <option value="MBC">MBC (Most Backward Class)</option>
            <option value="OBC">OBC (Other Backward Class)</option>
            <option value="SC">SC (Scheduled Caste)</option>
            <option value="ST">ST (Scheduled Tribe)</option>
            <option value="General">General</option>
        </select>
    </div>
</div>
        <div class="d-flex justify-content-between">
            <a href="{{ url_for('students') }}" class="btn btn-secondary">
                   <i class="bi bi-arrow-left"></i> Cancel
            </a>
            <button type="submit" class="btn btn-primary btn-lg">
                   <i class="bi bi-check-circle"></i> Submit Application
            </button>
        </div>
        </form>
        </div>
    </div>
</div>
<script>
const COURSE_SUBJECTS = {{ course_subjects | tojson }};
const CUTOFF_FORMULAS = {{ cutoff_formulas | tojson }};
const SUBJECT_LABELS  = {{ subject_labels | tojson }};
function updateSubjectFields() {
    const course = document.getElementById('course').value;
    const section = document.getElementById('subject-marks-section');
    const container = document.getElementById('subject-fields-container');
    const formulaInfo = document.getElementById('cutoff-formula-info');
    container.innerHTML = '';
    if (!course || !COURSE_SUBJECTS[course]) {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';
    const subjects = COURSE_SUBJECTS[course];
    const formula  = CUTOFF_FORMULAS[course] || {};
    // Build formula description
    const formulaParts = Object.entries(formula).map(([s, w]) =>
        `<strong>${SUBJECT_LABELS[s] || s}</strong> × ${w}%`
    ).join(' + ');
    formulaInfo.innerHTML = `<i class="bi bi-info-circle"></i>  ${formulaParts} <span class="ms-2 text-muted"></span>`;
    formulaInfo.style.display = 'none';
    subjects.forEach(subject => {
        const weight = formula[subject] || '';
        const label  = SUBJECT_LABELS[subject] || subject;
        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = `
            <label class="form-label">
                ${label} Marks
                ${weight ? `<span class="badge bg-warning text-dark ms-1">Weight: ${weight}%</span>` : ''}
                <span class="text-danger">*</span>
            </label>
            <input type="number" step="0.01" min="0" max="200"
                   class="form-control" name="${subject}_marks"
                   placeholder="Marks out of 100" required>
            <div class="form-text">Enter marks out of 100</div>
        `;
        container.appendChild(col);
    });
    // Live cutoff preview
    subjects.forEach(subject => {
        const input = container.querySelector(`[name="${subject}_marks"]`);
        if (input) input.addEventListener('input', updateCutoffPreview);
    });
}
function updateCutoffPreview() {
    const course = document.getElementById('course').value;
    if (!course || !CUTOFF_FORMULAS[course]) return;
    const formula = CUTOFF_FORMULAS[course];
    let total = 0;
    let complete = true;
    for (const [subject, weight] of Object.entries(formula)) {
        const input = document.querySelector(`[name="${subject}_marks"]`);
        if (!input || input.value === '') { complete = false; break; }
        total += (parseFloat(input.value) * weight) / 200.0; // out of 200
    }
    const formulaInfo = document.getElementById('cutoff-formula-info');
    if (complete) {
        const existing = formulaInfo.querySelector('.cutoff-preview');
        if (existing) existing.remove();
        const preview = document.createElement('span');
        preview.className = 'cutoff-preview ms-3 fw-bold text-primary';
        preview.textContent = `→ Cutoff Score: ${total.toFixed(2)} / 100`;
        formulaInfo.appendChild(preview);
    }
}
</script>
{% endblock %}

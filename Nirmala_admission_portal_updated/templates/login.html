{% extends "base.html" %}

{% block title %}Staff Login - Nirmala Admission Portal{% endblock %}

{% block content %}
<div class="login-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                            <h3 class="mt-3">STAFF LOGIN</h3>
                            <p class="text-muted">Nirmala Admission Portal</p>
                        </div>
                        
                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="bi bi-person"></i> Username
                                </label>
                                <input type="text" class="form-control" id="username" name="username" required autofocus>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">
                                    <i class="bi bi-key"></i> Password
                                </label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-box-arrow-in-right"></i> Login
                                </button>
                            </div>
                        </form>

                        
                        <div class="mt-3 text-center">
                            <a href="{{ url_for('index') }}" class="btn btn-link">
                                <i class="bi bi-arrow-left"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    
.hero-section {

    /* image + dark overlay */
    background:
        linear-gradient(rgba(0,40,60,0.65), rgba(0,40,60,0.65)),
        url("https://i.ytimg.com/vi/rQDa7xuBbp0/maxresdefault.jpg");

    background-size: cover;      /* full screen fill */
    background-position: center; /* center align */
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height: 100vh;
    color: white;
}

.hero-section .lead {
    font-size: 1.25rem;
    color: #f1f1f1;
}
</style>
{% endblock %}
